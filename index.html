<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>الخطط القرآنية</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

:root{
--primary:#0d6efd;
--bg:#f5f7fa;
}

body{
font-family:Tahoma,sans-serif;
background:var(--bg);
margin:0;
padding:20px;
}

.container{
max-width:1400px;
margin:auto;
background:#fff;
padding:20px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,.08);
}

h1{
text-align:center;
color:var(--primary);
margin-bottom:25px;
}

.section{
border:1px solid #ddd;
border-radius:10px;
padding:15px;
margin-bottom:20px;
}

.section-title{
font-size:20px;
font-weight:bold;
margin-bottom:15px;
color:var(--primary);
}

.row{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

label{
display:block;
margin-bottom:5px;
font-weight:bold;
}

input,
select{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:var(--primary);
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:var(--primary);
color:white;
}

.summary{
background:#eef5ff;
padding:15px;
border-radius:10px;
margin-top:20px;
}

.loading{
text-align:center;
padding:30px;
font-size:18px;
color:#666;
}

#pdfBtn{
display:none;
margin-top:15px;
}

</style>

</head>

<body>

<div class="container">

<h1>مولد الخطط القرآنية</h1>

<div class="section">

<div class="section-title">
بيانات الطالب
</div>

<div class="row">

<div>
<label>اسم الطالب</label>
<input id="student">
</div>

<div>
<label>عدد أيام الخطة</label>
<input id="daysCount" type="number" value="30">
</div>

</div>

</div>

<div class="section">

<div class="section-title">
الحفظ
</div>

<div class="row">

<div>
<label>السورة</label>
<select id="hifzSurah"></select>
</div>

<div>
<label>آية البداية</label>
<input id="hifzAyah" type="number" value="1">
</div>

<div>
<label>عدد الأوجه يومياً</label>
<input id="hifzFaces" type="number" step="0.5" value="1">
</div>

</div>

</div>

<div class="section">

<div class="section-title">
التثبيت
</div>

<div class="row">

<div>
<label>السورة</label>
<select id="tasbeetSurah"></select>
</div>

<div>
<label>آية البداية</label>
<input id="tasbeetAyah" type="number" value="1">
</div>

<div>
<label>عدد الأوجه يومياً</label>
<input id="tasbeetFaces" type="number" step="0.5" value="5">
</div>

</div>

</div>

<div class="section">

<div class="section-title">
المراجعة
</div>

<div class="row">

<div>
<label>السورة</label>
<select id="reviewSurah"></select>
</div>

<div>
<label>آية البداية</label>
<input id="reviewAyah" type="number" value="1">
</div>

<div>
<label>عدد الأوجه يومياً</label>
<input id="reviewFaces" type="number" step="0.5" value="10">
</div>

</div>

</div>

<button onclick="generatePlan()">
إنشاء الخطة
</button>

<button id="pdfBtn">
تحميل PDF
</button>

<div id="result">
<div class="loading">
جاري تحميل القرآن...
</div>
</div>

</div>

<script>

let quranData = [];
let ayahIndexMap = {};

const LINES_PER_PAGE = 15;
const LINES_PER_FACE = 7.5;

fetch("quran-data.json")
.then(r=>r.json())
.then(data=>{

quranData = data.sort(
(a,b)=>a.id-b.id
);

buildIndex();
fillSurahLists();

document.getElementById("result").innerHTML =
'<div class="loading">تم تحميل بيانات القرآن بنجاح</div>';

})
.catch(err=>{

console.error(err);

document.getElementById("result").innerHTML =
'<div class="loading">تعذر تحميل quran-data.json</div>';

});

function buildIndex(){

quranData.forEach((aya,index)=>{

ayahIndexMap[
`${aya.sura_no}-${aya.aya_no}`
] = index;

});

}

function fillSurahLists(){

const surahs =
[
...new Map(
quranData.map(
x=>[
x.sura_no,
x.sura_name_ar
]
)
).entries()
];

[
"hifzSurah",
"tasbeetSurah",
"reviewSurah"
]
.forEach(id=>{

const select =
document.getElementById(id);

surahs.forEach(([no,name])=>{

const option =
document.createElement("option");

option.value = no;
option.textContent = name;

select.appendChild(option);

});

});

}
function getSurahName(suraNo){

const aya =
quranData.find(
x => Number(x.sura_no) === Number(suraNo)
);

return aya
? aya.sura_name_ar
: '';

}

function getStartIndex(
suraNo,
ayaNo
){

const key =
`${suraNo}-${ayaNo}`;

return ayahIndexMap[key];

}

function getAyaLines(aya){

return (
Number(aya.line_end)
-
Number(aya.line_start)
) + 1;

}

function buildDailyRange(
startIndex,
faces
){

const targetLines =
faces * LINES_PER_FACE;

let currentLines = 0;

let endIndex = startIndex;

while(
endIndex < quranData.length
){

const aya =
quranData[endIndex];

currentLines +=
getAyaLines(aya);

if(
currentLines >= targetLines
){
break;
}

endIndex++;

}

const startAya =
quranData[startIndex];

const endAya =
quranData[endIndex];

return {

startIndex,

endIndex,

nextIndex:
Math.min(
endIndex + 1,
quranData.length - 1
),

startSura:
startAya.sura_no,

startSuraName:
startAya.sura_name_ar,

startAya:
startAya.aya_no,

endSura:
endAya.sura_no,

endSuraName:
endAya.sura_name_ar,

endAya:
endAya.aya_no,

lines:
currentLines,

faces

};

}

function formatRangeText(range){

if(
range.startSura ===
range.endSura
){

return `
${range.startSuraName}
<br>
${range.startAya}
-
${range.endAya}
`;

}

return `
${range.startSuraName}
${range.startAya}
-
${range.endSuraName}
${range.endAya}
`;

}

function generateTrackPlan(
suraNo,
ayaNo,
faces,
days
){

let currentIndex =
getStartIndex(
suraNo,
ayaNo
);

if(
currentIndex === undefined
){

alert(
'لم يتم العثور على الآية'
);

return [];

}

const result = [];

for(
let day = 0;
day < days;
day++
){

const range =
buildDailyRange(
currentIndex,
faces
);

result.push(range);

currentIndex =
range.nextIndex;

if(
currentIndex >=
quranData.length - 1
){
break;
}

}

return result;

}

function generatePlan(){

if(!quranData.length){

alert("لم يتم تحميل ملف القرآن");

return;

}

const student =
document.getElementById("student").value || "طالب";

const days =
parseInt(
document.getElementById("daysCount").value
);

const hifzPlan =
generateTrackPlan(
parseInt(
document.getElementById("hifzSurah").value
),
parseInt(
document.getElementById("hifzAyah").value
),
parseFloat(
document.getElementById("hifzFaces").value
),
days
);

const tasbeetPlan =
generateTrackPlan(
parseInt(
document.getElementById("tasbeetSurah").value
),
parseInt(
document.getElementById("tasbeetAyah").value
),
parseFloat(
document.getElementById("tasbeetFaces").value
),
days
);

const reviewPlan =
generateTrackPlan(
parseInt(
document.getElementById("reviewSurah").value
),
parseInt(
document.getElementById("reviewAyah").value
),
parseFloat(
document.getElementById("reviewFaces").value
),
days
);

const daysNames = [
"الأحد",
"الاثنين",
"الثلاثاء",
"الأربعاء",
"الخميس",
"الجمعة",
"السبت"
];

let html = `

<div id="planContent">

<div class="summary">

<h2>الخطة القرآنية</h2>

<p>
الطالب:
<b>${student}</b>
</p>

<p>
عدد الأيام:
<b>${days}</b>
</p>

</div>

<table>

<thead>

<tr>

<th>اليوم</th>

<th>الحفظ</th>
<th>المقدار</th>

<th>التثبيت</th>
<th>المقدار</th>

<th>المراجعة</th>
<th>المقدار</th>

</tr>

</thead>

<tbody>

`;

for(let i=0;i<days;i++){

const h =
hifzPlan[i];

const t =
tasbeetPlan[i];

const r =
reviewPlan[i];

html += `

<tr>

<td>
${daysNames[i % 7]}
</td>

<td>
${formatRangeText(h)}
</td>

<td>
${h.faces} وجه
</td>

<td>
${formatRangeText(t)}
</td>

<td>
${t.faces} وجه
</td>

<td>
${formatRangeText(r)}
</td>

<td>
${r.faces} وجه
</td>

</tr>

`;

}

html += `

</tbody>

</table>

<div class="summary">

<h3>
ملخص الخطة
</h3>

<p>
الحفظ:
${document.getElementById("hifzFaces").value}
 وجه يومياً
=
${(
parseFloat(
document.getElementById("hifzFaces").value
) * days
)}
 وجه
</p>

<p>
التثبيت:
${document.getElementById("tasbeetFaces").value}
 وجه يومياً
=
${(
parseFloat(
document.getElementById("tasbeetFaces").value
) * days
)}
 وجه
</p>

<p>
المراجعة:
${document.getElementById("reviewFaces").value}
 وجه يومياً
=
${(
parseFloat(
document.getElementById("reviewFaces").value
) * days
)}
 وجه
</p>

</div>

</div>

`;

document.getElementById("result").innerHTML =
html;

document.getElementById("pdfBtn").style.display =
"block";

}

document.getElementById("pdfBtn")
.addEventListener(
"click",
function(){

const element =
document.getElementById("planContent");

const opt = {

margin:0.5,

filename:
'الخطة_القرآنية.pdf',

image:{
type:'jpeg',
quality:1
},

html2canvas:{
scale:2
},

jsPDF:{
unit:'in',
format:'a4',
orientation:'portrait'
}

};

html2pdf()
.set(opt)
.from(element)
.save();

}
);
</script>

</body>
</html>
