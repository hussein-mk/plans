<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <title>مولد الخطط القرآنية</title>

    <style>
        body {
            font-family: Tahoma, sans-serif;
            background: #f5f7fa;
            padding: 20px;
            margin: 0;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0, 0, 0, .1);
        }

        h1 {
            text-align: center;
            color: #0d6efd;
        }

        .section {
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #0d6efd;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: #0d6efd;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background: #0b5ed7;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #0d6efd;
            color: white;
        }

        .summary {
            background: #eef5ff;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .loading {
            text-align: center;
            color: #666;
            padding: 20px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>مولد الخطط القرآنية</h1>

        <div class="section">

            <div class="section-title">
                بيانات الطالب
            </div>

            <div class="row">

                <div>
                    <label>اسم الطالب</label>
                    <input id="student">
                </div>

                <div>
                    <label>عدد الأيام</label>
                    <input id="daysCount" type="number" value="5">
                </div>

            </div>

        </div>

        <div class="section">

            <div class="section-title">
                الحفظ
            </div>

            <div class="row">

                <div>
                    <label>السورة</label>
                    <select id="hifzSurah"></select>
                </div>

                <div>
                    <label>آية البداية</label>
                    <input id="hifzAyah" type="number" value="1">
                </div>

                <div>
                    <label>عدد الأوجه</label>
                    <input id="hifzFaces" type="number" value="1">
                </div>

            </div>

        </div>

        <div class="section">

            <div class="section-title">
                التثبيت
            </div>

            <div class="row">

                <div>
                    <label>السورة</label>
                    <select id="tasbeetSurah"></select>
                </div>

                <div>
                    <label>آية البداية</label>
                    <input id="tasbeetAyah" type="number" value="1">
                </div>

                <div>
                    <label>عدد الأوجه</label>
                    <input id="tasbeetFaces" type="number" value="4">
                </div>

            </div>

        </div>

        <div class="section">

            <div class="section-title">
                المراجعة
            </div>

            <div class="row">

                <div>
                    <label>السورة</label>
                    <select id="reviewSurah"></select>
                </div>

                <div>
                    <label>آية البداية</label>
                    <input id="reviewAyah" type="number" value="1">
                </div>

                <div>
                    <label>عدد الأوجه</label>
                    <input id="reviewFaces" type="number" value="10">
                </div>

            </div>

        </div>

        <button onclick="generatePlan()">
            إنشاء الخطة
        </button>

        <div id="result"></div>

    </div>

    <script>

        let quranData = [];

        fetch("quran-data.json")
            .then(r => r.json())
            .then(data => {

                quranData = data;

                const surahs =
                    [...new Set(
                        data.map(x => x.sura_name_ar)
                    )];

                fillSurahs(
                    "hifzSurah",
                    surahs
                );

                fillSurahs(
                    "tasbeetSurah",
                    surahs
                );

                fillSurahs(
                    "reviewSurah",
                    surahs
                );

            })
            .catch(err => {

                document.getElementById("result").innerHTML =
                    '<div class="loading">تعذر تحميل quran-data.json</div>';

            });

        function fillSurahs(id, list) {

            const select =
                document.getElementById(id);

            list.forEach(name => {

                const option =
                    document.createElement("option");

                option.value = name;
                option.textContent = name;

                select.appendChild(option);

            });

        }

        function getAya(
            surah,
            ayah
        ) {

            return quranData.find(
                x =>
                    x.sura_name_ar === surah &&
                    x.aya_no === ayah
            );

        }

        function getLastAyaInSurah(
            surah
        ) {

            const ayat =
                quranData.filter(
                    x => x.sura_name_ar === surah
                );

            return ayat[ayat.length - 1];

        }
// دالة حساب النطاق بعد التعديل لضمان دقة الأرقام
function calculateRange(surah, startAyah, faces) {
    const surahAyat = quranData.filter(x => x.sura_name_ar === surah);
    const startIndex = surahAyat.findIndex(x => Number(x.aya_no) === Number(startAyah));

    if (startIndex === -1) return null;

    const startRecord = surahAyat[startIndex];
    // تحويل القيم إلى أرقام لضمان نجاح العملية الحسابية
    const targetPage = Number(startRecord.page) + (Number(faces) / 2);

    let endRecord = startRecord;

    for (let i = startIndex; i < surahAyat.length; i++) {
        if (Number(surahAyat[i].page) <= targetPage) {
            endRecord = surahAyat[i];
        } else {
            break;
        }
    }

    return {
        start: startRecord.aya_no,
        end: endRecord.aya_no,
        nextAyah: Number(endRecord.aya_no) + 1,
        finished: Number(endRecord.aya_no) === Number(surahAyat[surahAyat.length - 1].aya_no)
    };
}

// دالة إنشاء الخطة (تأكد من استبدال دالتك القديمة بهذه لضمان التوافق)
function handleGeneratePlan() {
    // التحقق من تحميل البيانات قبل البدء
    if (typeof quranData === 'undefined' || quranData.length === 0) {
        console.error("بيانات القرآن غير محملة");
        return;
    }

    // هنا يتم جلب المدخلات من التصميم الخاص بك
    const selectedSurah = document.getElementById('surahSelect').value;
    const startAyah = document.getElementById('startAyahInput').value;
    const faces = document.getElementById('facesInput').value;

    const result = calculateRange(selectedSurah, startAyah, faces);

    if (result) {
        // تحديث واجهة المستخدم دون تغيير التنسيق
        document.getElementById('resultDisplay').innerText = 
            `من آية ${result.start} إلى آية ${result.end}`;
    } else {
        alert("خطأ في تحديد الآيات، يرجى التأكد من البيانات");
    }
}

    </script>

</body>

</html>
