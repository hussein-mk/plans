<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مولد الخطط القرآنية</title>
    <style>
        /* التنسيق الأصلي كما هو */
        body { font-family: Tahoma, sans-serif; background: #f5f7fa; padding: 20px; margin: 0; }
        .container { max-width: 1200px; margin: auto; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 0 15px rgba(0, 0, 0, .1); }
        h1 { text-align: center; color: #0d6efd; }
        .section { border: 1px solid #ddd; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .section-title { font-size: 20px; font-weight: bold; margin-bottom: 15px; color: #0d6efd; }
        .row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        button { background: #0d6efd; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>مولد الخطط القرآنية</h1>
    
    <div class="section">
        <button onclick="generatePlan()">إنشاء الخطة</button>
    </div>

    <div id="resultDisplay"></div>
</div>

<script>
    let quranData = [];

    // تحميل البيانات
    fetch('quran-data.json')
        .then(response => response.json())
        .then(data => quranData = data);

    // الدالة المعدلة برمجياً
    function calculateRange(surah, startAyah, faces) {
        if (!quranData || quranData.length === 0) return null;
        
        const surahAyat = quranData.filter(x => x.sura_name_ar === surah);
        const startIndex = surahAyat.findIndex(x => Number(x.aya_no) === Number(startAyah));

        if (startIndex === -1) return null;

        const startRecord = surahAyat[startIndex];
        const targetPage = Number(startRecord.page) + (Number(faces) / 2);

        let endRecord = startRecord;
        for (let i = startIndex; i < surahAyat.length; i++) {
            if (Number(surahAyat[i].page) <= targetPage) {
                endRecord = surahAyat[i];
            } else {
                break;
            }
        }

        return {
            start: startRecord.aya_no,
            end: endRecord.aya_no,
            nextAyah: Number(endRecord.aya_no) + 1,
            finished: Number(endRecord.aya_no) === Number(surahAyat[surahAyat.length - 1].aya_no)
        };
    }

    function generatePlan() {
        // مثال لاستدعاء الدالة (قم بتكييفه مع مدخلاتك الحقيقية)
        const plan = calculateRange("الفَاتِحة", 1, 2); 
        
        if (plan) {
            document.getElementById('resultDisplay').innerHTML = `
                <h3>الخطة:</h3>
                <p>من آية ${plan.start} إلى آية ${plan.end}</p>
            `;
        } else {
            alert("حدث خطأ في معالجة البيانات");
        }
    }
</script>
</body>
</html>
